<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GeoPin Multiplayer</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #313244;
            --text: #cdd6f4;
            --primary: #89b4fa;
            --success: #a6e3a1;
            --accent: #f38ba8;
        }
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            /* Prevents pull-to-refresh on mobile */
            overscroll-behavior-y: contain; 
        }
        .screen {
            display: none;
            height: 100%;
            width: 100%;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
            overflow-y: auto;
        }
        .active { display: flex; }
        
        h1, h2, h3 { text-align: center; margin: 10px 0; }
        
        .config-group {
            width: 90%;
            max-width: 350px;
            background: var(--surface);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border-radius: 8px;
            border: 1px solid #45475a;
            font-size: 16px;
            box-sizing: border-box;
        }
        input, select { background: var(--bg); color: var(--text); }
        
        button {
            background-color: var(--primary);
            color: #11111b;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 15px;
            padding: 15px;
        }
        button:active { opacity: 0.7; }
        .btn-success { background-color: var(--success); }

        #map-container, #result-map-container {
            width: 100%;
            flex-grow: 1;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
            position: relative;
            border: 2px solid var(--surface);
        }
        #result-map-container { margin-bottom: 10px; }
        
        /* Updated map background to a lighter color so it blends with the light tiles */
        #map, #result-map { width: 100%; height: 100%; background: #e6e9ef; }
        
        .top-bar {
            width: 100%;
            text-align: center;
            background: var(--surface);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        .target-location { font-size: 26px; font-weight: bold; color: var(--accent); margin: 5px 0;}
        
        .leaderboard {
            width: 100%; max-width: 350px;
            background: var(--surface);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .score-row {
            display: flex; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid #45475a;
        }
        .score-row:last-child { border-bottom: none; }

        /* Map Overlay Scoreboard */
        .map-overlay-scoreboard {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(49, 50, 68, 0.95);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            border: 1px solid #45475a;
            max-width: 200px;
        }
        .overlay-score-row {
            display: flex; justify-content: space-between;
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .overlay-score-row:last-child { border-bottom: none; }

        /* Custom Map Pins */
        .player-pin {
            background-color: var(--primary);
            color: #11111b;
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .target-pin {
            background-color: var(--success);
            color: #11111b;
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(166, 227, 161, 0.8);
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <h1>📍 GeoPin</h1>
        
        <div class="config-group">
            <h3>Players</h3>
            <input type="text" id="p1" placeholder="Player 1 Name (Required)">
            <input type="text" id="p2" placeholder="Player 2 Name (Optional)">
            <input type="text" id="p3" placeholder="Player 3 Name (Optional)">
            <input type="text" id="p4" placeholder="Player 4 Name (Optional)">
        </div>

        <div class="config-group">
            <h3>Game Settings</h3>
            <label for="mode-select">Category:</label>
            <select id="mode-select">
                <option value="cities">Cities (120+)</option>
                <option value="countries">Countries (120+)</option>
                <option value="mountains">Mountains (60+)</option>
                <option value="landmarks">Landmarks (60+)</option>
            </select>

            <label for="round-select">Rounds:</label>
            <select id="round-select">
                <option value="3">3 Rounds</option>
                <option value="5">5 Rounds</option>
                <option value="7">7 Rounds</option>
                <option value="10">10 Rounds</option>
                <option value="20">20 Rounds</option>
            </select>
        </div>

        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="pass-screen" class="screen">
        <h1 style="margin-top: 25vh;">Round <span id="pass-round"></span></h1>
        <h2>Turn: <span id="pass-player-name" style="color: var(--primary); font-size: 32px;"></span></h2>
        <p style="text-align: center; margin-bottom: 40px;">Pass the phone to this player.<br>Make sure they don't see where you guessed!</p>
        <button onclick="startTurn()">I'm Ready!</button>
    </div>

    <div id="game-screen" class="screen" style="padding: 10px;">
        <div class="top-bar">
            <div style="font-size: 14px; color: var(--text);">Round <span id="ui-round">1</span> | <span id="ui-player" style="font-weight: bold; color: var(--primary);">Player</span>'s Turn</div>
            <div style="margin-top: 5px;">Find:</div>
            <div class="target-location" id="ui-target">Target</div>
        </div>
        
        <div id="map-container">
            <div id="map"></div>
        </div>
        
        <button id="confirm-btn" class="btn-success" onclick="confirmGuess()" style="display: none; margin-bottom: 0;">Confirm Pin</button>
    </div>

    <div id="round-map-screen" class="screen" style="padding: 10px;">
        <div class="top-bar" style="padding: 10px;">
            <div style="font-size: 14px; color: var(--text);">Round <span id="map-res-round">1</span> Results</div>
            <div class="target-location" id="map-res-target" style="font-size: 20px;">Target</div>
        </div>
        
        <div id="result-map-container">
            <div id="map-scoreboard-overlay" class="map-overlay-scoreboard">
                </div>
            <div id="result-map"></div>
        </div>
        
        <button onclick="nextRoundOrFinish()" style="margin-bottom: 0;">Continue to Next Round</button>
    </div>

    <div id="final-results-screen" class="screen">
        <h1 style="color: var(--success); font-size: 40px;">Game Over!</h1>
        <h2>Final Scoreboard</h2>
        
        <div class="leaderboard" id="final-leaderboard">
            </div>
        <button onclick="resetGame()">Play Again</button>
    </div>

    // --- LOGIC ---
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startGame() {
        players = [];
        for(let i=1; i<=4; i++) {
            const name = document.getElementById(`p${i}`).value.trim();
            if(name) players.push({ name: name, totalScore: 0, roundScore: 0, roundDist: 0, lastGuess: null });
        }
        
        if(players.length === 0) players.push({ name: "Player 1", totalScore: 0, roundScore: 0, roundDist: 0, lastGuess: null });

        const requestedRounds = parseInt(document.getElementById('round-select').value);
        const mode = document.getElementById('mode-select').value;
        
        currentLocations = [...db[mode]].sort(() => 0.5 - Math.random());
        totalRounds = Math.min(requestedRounds, currentLocations.length); 
        currentRound = 1;
        
        initMap();
        setupRound();
    }

    function initMap() {
        if (map !== null) { map.remove(); }
        
        map = L.map('map', { center: [20, 0], zoom: 2, zoomControl: false });
        
        // Switched to LIGHT no-labels tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
        }).addTo(map);

        map.on('click', function(e) {
            currentGuess = e.latlng;
            if (currentMarker) map.removeLayer(currentMarker);
            currentMarker = L.marker(currentGuess).addTo(map);
            document.getElementById('confirm-btn').style.display = 'block';
        });
    }

    function setupRound() {
        currentTarget = currentLocations[currentRound - 1];
        currentPlayerIndex = 0;
        showPassScreen();
    }

    function showPassScreen() {
        document.getElementById('pass-round').innerText = currentRound;
        document.getElementById('pass-player-name').innerText = players[currentPlayerIndex].name;
        switchScreen('pass-screen');
    }

    function startTurn() {
        switchScreen('game-screen');
        document.getElementById('ui-round').innerText = currentRound + " / " + totalRounds;
        document.getElementById('ui-player').innerText = players[currentPlayerIndex].name;
        document.getElementById('ui-target').innerText = currentTarget.name;
        
        if (currentMarker) map.removeLayer(currentMarker);
        currentGuess = null;
        document.getElementById('confirm-btn').style.display = 'none';
        map.setView([20, 0], 2); 
        setTimeout(() => map.invalidateSize(), 100); 
    }

    function confirmGuess() {
        const player = players[currentPlayerIndex];
        const distKm = getDistanceFromLatLonInKm(currentGuess.lat, currentGuess.lng, currentTarget.lat, currentTarget.lng);
        
        let score = 0;
        if (distKm <= 30) {
            score = 5000;
        } else {
            score = Math.floor(5000 * Math.exp(-distKm / 2500)); 
            if (score < 0) score = 0;
        }

        player.roundScore = score;
        player.roundDist = distKm;
        player.totalScore += score;
        player.lastGuess = { lat: currentGuess.lat, lng: currentGuess.lng }; 

        currentPlayerIndex++;
        
        if (currentPlayerIndex < players.length) {
            showPassScreen();
        } else {
            showRoundMapResults();
        }
    }

    function showRoundMapResults() {
        switchScreen('round-map-screen');
        document.getElementById('map-res-round').innerText = currentRound;
        document.getElementById('map-res-target').innerText = currentTarget.name;

        // Populate Scoreboard Overlay
        const sorted = [...players].sort((a, b) => b.roundScore - a.roundScore);
        const overlay = document.getElementById('map-scoreboard-overlay');
        overlay.innerHTML = `<div style="font-weight:bold; color:var(--primary); margin-bottom:8px; border-bottom:1px solid #45475a; padding-bottom:4px;">Scores</div>`;
        sorted.forEach((p, idx) => {
            let shortName = p.name.length > 8 ? p.name.substring(0, 7) + '..' : p.name;
            overlay.innerHTML += `
                <div class="overlay-score-row">
                    <div><b>${idx+1}. ${shortName}</b><br><small style="color:#a6adc8;">${Math.round(p.roundDist).toLocaleString()} km</small></div>
                    <div style="color: var(--success); font-weight: bold; margin-left: 10px;">+${p.roundScore}</div>
                </div>
            `;
        });

        // Initialize Result Map with LIGHT tiles
        if (resultMap === null) {
            resultMap = L.map('result-map', { zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(resultMap);
        }

        // Clean up previous round
        resultMarkers.forEach(m => resultMap.removeLayer(m));
        resultMarkers = [];

        let boundsArr = [];

        // Add Target Marker
        const targetIcon = L.divIcon({
            className: 'target-pin',
            html: '📍',
            iconSize: [36, 36],
            iconAnchor: [18, 18]
        });
        const targetM = L.marker([currentTarget.lat, currentTarget.lng], {icon: targetIcon}).addTo(resultMap);
        resultMarkers.push(targetM);
        boundsArr.push([currentTarget.lat, currentTarget.lng]);

        // Add Player Markers & Dotted Lines
        players.forEach(p => {
            if(p.lastGuess) {
                const initials = p.name.substring(0, 2).toUpperCase();
                const pIcon = L.divIcon({
                    className: 'player-pin',
                    html: initials,
                    iconSize: [30, 30],
                    iconAnchor: [15, 15]
                });
                const pM = L.marker([p.lastGuess.lat, p.lastGuess.lng], {icon: pIcon}).addTo(resultMap);
                resultMarkers.push(pM);
                boundsArr.push([p.lastGuess.lat, p.lastGuess.lng]);

                // Dark dotted line for high contrast against the light map
                const flightPath = L.polyline([
                    [p.lastGuess.lat, p.lastGuess.lng],
                    [currentTarget.lat, currentTarget.lng]
                ], {
                    color: '#11111b', 
                    weight: 2,
                    dashArray: '5, 8',
                    opacity: 0.8
                }).addTo(resultMap);
                resultMarkers.push(flightPath);
            }
        });

        setTimeout(() => {
            resultMap.invalidateSize();
            resultMap.fitBounds(boundsArr, { paddingTopLeft: [220, 20], paddingBottomRight: [20, 20], maxZoom: 10 });
        }, 100);
    }

    function nextRoundOrFinish() {
        currentRound++;
        if (currentRound > totalRounds) {
            showFinalResults();
        } else {
            setupRound();
        }
    }

    function showFinalResults() {
        switchScreen('final-results-screen');
        const sorted = [...players].sort((a, b) => b.totalScore - a.totalScore);
        const board = document.getElementById('final-leaderboard');
        board.innerHTML = '';
        sorted.forEach((p, idx) => {
            const medal = idx === 0 ? '🏆' : (idx === 1 ? '🥈' : (idx === 2 ? '🥉' : ''));
            board.innerHTML += `
                <div class="score-row">
                    <div style="font-size: 20px;">${medal} <b>${p.name}</b></div>
                    <div style="color: var(--success); font-size: 22px; font-weight: bold;">${p.totalScore.toLocaleString()}</div>
                </div>
            `;
        });
    }

    function resetGame() {
        document.getElementById('p1').value = '';
        document.getElementById('p2').value = '';
        document.getElementById('p3').value = '';
        document.getElementById('p4').value = '';
        switchScreen('setup-screen');
    }

    // --- UTILS ---
    function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
      const R = 6371; 
      const dLat = deg2rad(lat2-lat1);
      const dLon = deg2rad(lon2-lon1); 
      const a = 
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
      return R * c; 
    }
    function deg2rad(deg) { return deg * (Math.PI/180); }
</script>
