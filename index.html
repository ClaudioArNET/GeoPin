        if (map !== null) map.remove();

            zoom: 2, 
            zoomControl: false,
            worldCopyJump: false, // Prevents infinite repeat
            maxBounds: [[-90, -180], [90, 180]], // Hard limit
            maxBoundsViscosity: 1.0 
        });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap', subdomains: 'abcd', maxZoom: 19
        }).addTo(map);

        map.on('click', function(e) {
            // Normalize longitude to be within -180 to 180
            let lat = e.latlng.lat;
            let lng = ((e.latlng.lng + 180) % 360) - 180;
            currentGuess = { lat: lat, lng: lng };
            
            if (currentMarker) map.removeLayer(currentMarker);
            currentMarker = L.marker([lat, lng]).addTo(map);
            document.getElementById('confirm-btn').style.display = 'block';
        });
    }
