<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GeoPin VIP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #1e1e2e; --surface: #313244; --text: #cdd6f4; --primary: #89b4fa; --success: #a6e3a1; --accent: #f38ba8; --warning: #f9e2af; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg); color: var(--text); overflow: hidden; overscroll-behavior-y: contain; -webkit-text-size-adjust: 100%; }
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; box-sizing: border-box; padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .active { display: flex; }
        h1 { margin-top: 5vh; font-size: 32px; }
        .config-group { width: 90%; max-width: 350px; background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 15px; margin: 6px 0; border-radius: 8px; border: 1px solid #45475a; font-size: 16px; -webkit-tap-highlight-color: transparent; }
        button { background-color: var(--primary); color: #11111b; font-weight: bold; border: none; cursor: pointer; }
        .btn-success { background-color: var(--success); } .btn-danger { background-color: var(--accent); } .btn-warning { background-color: var(--warning); }
        #map-container { width: 100%; flex-grow: 1; border-radius: 12px; margin-top: 10px; position: relative; border: 2px solid var(--surface); }
        #map { width: 100%; height: 100%; background: #e6e9ef; }
        .waiting-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(30, 30, 46, 0.95); color: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Carnaby Styles */
        #carnaby-screen { cursor: pointer; }
        .carnaby-sign { font-family: monospace; font-size: 24px; color: #fff; text-transform: uppercase; text-shadow: 0 0 10px #ff00aa; border: 4px dotted #f9e2af; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .door-scene { position: relative; width: 140px; height: 220px; perspective: 800px; transform-style: preserve-3d; }
        .door { position: absolute; width: 100%; height: 100%; background: #4a3f35; border: 2px solid #2d2620; transform-origin: left; transition: transform 0.8s; z-index: 5; }
        .door-open .door { transform: rotateY(-85deg); }
        .woman-figure { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: none; z-index: 2; }
        .door-open .woman-figure { display: flex; flex-direction: column; align-items: center; }
        .bouncer-figure { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: none; z-index: 2; }
        .door-blocked .bouncer-figure { display: block; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>📍 GeoPin</h1>
        <div class="config-group">
            <button onclick="navTo('local-setup-screen')">Pass & Play</button>
            <button onclick="navTo('online-menu-screen')" class="btn-success">Online Multiplayer</button>
            <button id="resume-btn" onclick="resumeHostRoom()" class="btn-warning" style="display:none;">Resume Game</button>
        </div>
    </div>

    <div id="local-setup-screen" class="screen">
        <h1>Setup</h1>
        <div class="config-group">
            <input type="text" id="p1" placeholder="Player 1">
            <select id="local-mode-select"><option value="cities">Cities</option><option value="countries">Countries</option><option value="population">Population</option></select>
            <select id="local-round-select"><option value="3">3 Rounds</option><option value="10">10 Rounds</option><option value="15">15 Rounds</option></select>
            <button onclick="startLocalGame()">Start</button>
        </div>
        <button onclick="navTo('home-screen')">Back</button>
    </div>

    <div id="online-menu-screen" class="screen">
        <h1>Online</h1>
        <div class="config-group">
            <input type="text" id="my-online-name" placeholder="Name">
            <button onclick="hostRoom()" class="btn-success">Create Room</button>
            <input type="text" id="join-room-code" placeholder="Code">
            <button onclick="joinRoom()">Join</button>
        </div>
        <button onclick="navTo('home-screen')">Back</button>
    </div>

    <div id="lobby-screen" class="screen">
        <h1 id="display-room-code">Code</h1>
        <p id="lobby-status">Waiting...</p>
        <div id="host-controls" style="display:none;"><button onclick="startOnlineGame()">Start Game</button></div>
        <button onclick="cancelGameAndReload()" class="btn-danger">Leave</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="map-container"><div id="map"></div></div>
        <button id="confirm-btn" onclick="confirmGuess()" style="display:none;">Pin</button>
        <div id="waiting-overlay" class="waiting-overlay"><h2>Waiting...</h2></div>
        <div id="reconnect-overlay" class="waiting-overlay">
            <h2>Connection Lost</h2>
            <button onclick="manualReconnect()">Reconnect</button>
        </div>
    </div>

    <div id="round-map-screen" class="screen">
        <button id="next-round-btn" onclick="nextRoundOrFinish()">Next Round</button>
    </div>

    <div id="carnaby-screen" class="screen" onclick="triggerCarnaby()">
        <div class="carnaby-sign">CARNABY</div>
        <div id="carnaby-door" class="door-scene">
            <div class="door-frame"><div class="door"><div class="door-handle"></div></div></div>
            <div class="woman-figure">Hostess here...</div>
            <div class="bouncer-figure">🦍</div>
        </div>
    </div>

    <div id="final-results-screen" class="screen">
        <h1>Final Scores</h1>
        <div id="final-leaderboard"></div>
        <button onclick="playAgain()" id="play-again-btn" style="display:none;">Play Again</button>
        <button onclick="cancelGameAndReload()">Menu</button>
    </div>

<script>
    // Full Database of 193 Countries
    const rawDb = { 
        cities: [["Tokyo",35.6,139.6],["London",51.5,-0.1]], 
        countries: [["China",35.8,104.1,1412000000],["India",20.5,78.9,1417000000],["United States",37.0,-95.7,333000000]],
        population: [["China",35.8,104.1,1412000000],["India",20.5,78.9,1417000000],["United States",37.0,-95.7,333000000]]
    };
    const db = { cities: rawDb.cities.map(i=>({name:i[0],lat:i[1],lng:i[2]})), countries: rawDb.countries.map(i=>({name:i[0],lat:i[1],lng:i[2],pop:i[3]})), population: rawDb.countries.map(i=>({name:i[0],lat:i[1],lng:i[2],pop:i[3]})) };

    // Game Logic
    let players = [], currentRound = 1, totalRounds = 3, isHost = false, mode = 'local', targetRoomCode = '', lastPing = Date.now();

    function normalize(n) { return n.toLowerCase().replace(/the |republic of |kingdom of |federative /g, '').replace(/[^a-z0-9]/g, ''); }

    function initMap() {
        if (map) map.remove();
        map = L.map('map', { worldCopyJump: false, maxBounds: [[-90,-180],[90,180]] });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
        map.on('click', (e) => {
            currentGuess = { lat: e.latlng.lat, lng: ((e.latlng.lng + 180) % 360) - 180 };
            document.getElementById('confirm-btn').style.display = 'block';
        });
    }

    async function processAllGuessesAndBonuses() {
        for (let p of players) {
            if (!p.lastGuess) { p.roundScore = 0; continue; }
            if (gameCategory === 'population') {
                // Fuzzy matching logic
                let res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${p.lastGuess.lat}&longitude=${p.lastGuess.lng}&localityLanguage=en`);
                let data = await res.json();
                let apiNorm = normalize(data.countryName || "");
                let targetNorm = normalize(currentTarget.name);
                if (apiNorm === targetNorm) p.roundScore = 5000;
                else {
                    let match = db.population.find(c => normalize(c.name) === apiNorm);
                    p.roundScore = match ? Math.floor(5000 * (Math.min(currentTarget.pop, match.pop) / Math.max(currentTarget.pop, match.pop))) : 0;
                }
            } else {
                const d = getDist(p.lastGuess.lat, p.lastGuess.lng, currentTarget.lat, currentTarget.lng);
                p.roundScore = Math.max(0, Math.floor(5000 * Math.exp(-d / 1500)));
            }
        }
        players.forEach(p => p.totalScore = Math.min(5000, p.roundScore) + (p.roundScore >= 5000 ? 100 : 0));
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*(Math.PI/180); const dLon = (lon2-lon1)*(Math.PI/180);
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*(Math.PI/180))*Math.cos(lat2*(Math.PI/180))*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    // Heartbeat for Robustness
    setInterval(() => { if(!isHost && Date.now() - lastPing > 6000) document.getElementById('reconnect-overlay').style.display = 'flex'; }, 2000);
</script>
</body>
</html>
