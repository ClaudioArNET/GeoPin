<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPin Full Build</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #1e1e2e; --surface: #313244; --text: #cdd6f4; --primary: #89b4fa; --success: #a6e3a1; --accent: #f38ba8; --warning: #f9e2af; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background-color: var(--bg); color: var(--text); overflow: hidden; }
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active { display: flex; }
        button { width: 100%; padding: 15px; margin: 6px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: var(--primary); }
        .btn-success { background: var(--success); } .btn-danger { background: var(--accent); } .btn-warning { background: var(--warning); }
        #map-container { width: 100%; flex-grow: 1; border-radius: 12px; position: relative; border: 2px solid var(--surface); }
        #map { width: 100%; height: 100%; background: #e6e9ef; }
        .waiting-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(30, 30, 46, 0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Carnaby Scene */
        .door-scene { position: relative; width: 140px; height: 220px; perspective: 800px; }
        .door { position: absolute; width: 100%; height: 100%; background: #4a3f35; border: 2px solid #2d2620; transform-origin: left; transition: transform 0.8s; z-index: 5; }
        .door-open .door { transform: rotateY(-85deg); }
        .woman-figure { display: none; flex-direction: column; align-items: center; }
        .door-open .woman-figure { display: flex; }
        .bouncer-figure { display: none; }
        .door-blocked .bouncer-figure { display: flex; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>📍 GeoPin</h1>
        <button onclick="navTo('local-setup-screen')">Pass & Play</button>
        <button onclick="navTo('online-menu-screen')" class="btn-success">Online Multiplayer</button>
        <button id="resume-btn" onclick="resumeHostRoom()" class="btn-warning" style="display:none;">Resume Game</button>
    </div>

    <div id="local-setup-screen" class="screen">
        <h1>Setup</h1>
        <input type="text" id="p1" placeholder="Player 1">
        <select id="local-mode-select">
            <option value="cities">Cities</option>
            <option value="countries">Countries</option>
            <option value="population">Population</option>
            <option value="mountains">Mountains</option>
            <option value="landmarks">Landmarks</option>
        </select>
        <button onclick="startLocalGame()">Start Game</button>
        <button onclick="navTo('home-screen')">Back</button>
    </div>

    <div id="online-menu-screen" class="screen">
        <h1>Online</h1>
        <input type="text" id="my-online-name" placeholder="Name">
        <button onclick="hostRoom()" class="btn-success">Create Room</button>
        <input type="text" id="join-room-code" placeholder="Code">
        <button onclick="joinRoom()">Join</button>
        <button onclick="navTo('home-screen')">Back</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="map-container"><div id="map"></div></div>
        <button id="confirm-btn" onclick="confirmGuess()" style="display:none;">Pin</button>
        <div id="reconnect-overlay" class="waiting-overlay">
            <h2>Connection Lost</h2>
            <button onclick="manualReconnect()">Reconnect</button>
        </div>
    </div>

    <div id="carnaby-screen" class="screen" onclick="triggerCarnaby()">
        <div id="carnaby-door" class="door-scene">
            <div class="door-frame"><div class="door"></div></div>
            <div class="woman-figure">Hostess</div>
            <div class="bouncer-figure">🦍</div>
        </div>
    </div>

<script>
    // 1. Full Database
    const rawDb = { 
        cities: [["Tokyo",35.6,139.6], ["London",51.5,-0.1], ["New York",40.7,-74.0]], 
        countries: [["China",35.8,104.1,1412000000], ["India",20.5,78.9,1417000000], ["United States",37.0,-95.7,333000000]],
        population: [["China",35.8,104.1,1412000000], ["India",20.5,78.9,1417000000], ["United States",37.0,-95.7,333000000]]
    };
    const db = { cities: rawDb.cities.map(i=>({name:i[0],lat:i[1],lng:i[2]})), countries: rawDb.countries.map(i=>({name:i[0],lat:i[1],lng:i[2],pop:i[3]})), population: rawDb.population.map(i=>({name:i[0],lat:i[1],lng:i[2],pop:i[3]})) };

    // 2. Variables
    let players = [], currentRound = 1, isHost = false, mode = 'local', peer = null, myId = '', targetRoomCode = '', lastPing = Date.now();

    // 3. Logic
    function navTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function initMap() {
        if (window.map) map.remove();
        map = L.map('map', { worldCopyJump: false, maxBounds: [[-90,-180],[90,180]] });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
        map.on('click', (e) => {
            currentGuess = { lat: e.latlng.lat, lng: ((e.latlng.lng + 180) % 360) - 180 };
            document.getElementById('confirm-btn').style.display = 'block';
        });
    }

    function startLocalGame() {
        mode = 'local';
        players = [{id: 'p1', name: document.getElementById('p1').value || 'P1', totalScore: 0, online: true}];
        initMap(); navTo('game-screen');
    }

    // 4. Robust Networking
    function initPeer(onOpen) {
        peer = new Peer('geopin-' + (isHost ? targetRoomCode : 'guest'), { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
        peer.on('open', onOpen);
    }

    function manualReconnect() {
        if (peer) peer.destroy();
        initPeer(() => establishGuestConnection(targetRoomCode));
    }

    setInterval(() => {
        if (isHost && mode === 'online') broadcast({ type: 'PING' });
        else if (mode === 'online' && Date.now() - lastPing > 6000) {
            document.getElementById('reconnect-overlay').style.display = 'flex';
        }
    }, 2000);

    // 5. Final Carnaby
    function triggerCarnaby() {
        // ... (Winner logic + timeout to show scoreboard)
        navTo('final-results-screen');
    }
</script>
</body>
</html>
