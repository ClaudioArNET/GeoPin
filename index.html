<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GeoPin</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root {
            --bg: #1e1e2e; --surface: #313244; --text: #cdd6f4;
            --primary: #89b4fa; --success: #a6e3a1; --accent: #f38ba8;
        }
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg); color: var(--text);
            overflow: hidden; overscroll-behavior-y: contain; 
        }
        .screen {
            display: none; height: 100%; width: 100%;
            flex-direction: column; align-items: center;
            box-sizing: border-box; padding: 20px; overflow-y: auto;
        }
        .active { display: flex; }
        
        h1, h2, h3 { text-align: center; margin: 10px 0; }
        .config-group {
            width: 90%; max-width: 350px; background: var(--surface);
            padding: 15px; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box;
        }
        input, select, button {
            width: 100%; padding: 12px; margin: 6px 0;
            border-radius: 8px; border: 1px solid #45475a; font-size: 16px; box-sizing: border-box;
        }
        input, select { background: var(--bg); color: var(--text); }
        button {
            background-color: var(--primary); color: #11111b; font-weight: bold;
            border: none; cursor: pointer; transition: opacity 0.2s; padding: 15px;
        }
        button:active { opacity: 0.7; }
        .btn-success { background-color: var(--success); }
        .btn-secondary { background-color: #45475a; color: var(--text); }
        .btn-danger { background-color: var(--accent); color: #11111b; }

        #map-container, #result-map-container {
            width: 100%; flex-grow: 1; border-radius: 12px; overflow: hidden;
            margin-top: 10px; position: relative; border: 2px solid var(--surface);
        }
        #result-map-container { margin-bottom: 10px; }
        #map, #result-map { width: 100%; height: 100%; background: #e6e9ef; }
        
        .top-bar {
            width: 100%; text-align: center; background: var(--surface);
            padding: 15px; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box;
        }
        .target-location { font-size: 26px; font-weight: bold; color: var(--accent); margin: 5px 0;}
        
        .leaderboard {
            width: 100%; max-width: 350px; background: var(--surface);
            border-radius: 12px; padding: 15px; margin-bottom: 20px; box-sizing: border-box;
        }
        .score-row {
            display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #45475a;
        }
        .score-row:last-child { border-bottom: none; }

        .map-overlay-scoreboard {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(49, 50, 68, 0.95); padding: 10px; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); border: 1px solid #45475a; max-width: 200px;
        }
        .overlay-score-row {
            display: flex; justify-content: space-between; font-size: 13px;
            padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .overlay-score-row:last-child { border-bottom: none; }

        .player-pin {
            background-color: var(--primary); color: #11111b; border-radius: 50%;
            border: 2px solid #fff; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .target-pin {
            background-color: var(--success); color: #11111b; border-radius: 50%;
            border: 2px solid #fff; display: flex; align-items: center; justify-content: center;
            font-size: 18px; box-shadow: 0 0 10px rgba(166, 227, 161, 0.8);
        }
        .waiting-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(30, 30, 46, 0.9); color: white; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; display: none;
        }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1 style="margin-top: 15vh; font-size: 40px;">📍 GeoPin</h1>
        <div class="config-group" style="margin-top: 30px;">
            <button onclick="navTo('local-setup-screen')">Pass & Play (Local)</button>
            <button onclick="navTo('online-menu-screen')" class="btn-success">Online Multiplayer</button>
        </div>
    </div>

    <div id="local-setup-screen" class="screen">
        <h1>Pass & Play</h1>
        <div class="config-group">
            <input type="text" id="p1" placeholder="Player 1 Name (Required)">
            <input type="text" id="p2" placeholder="Player 2 Name (Optional)">
            <input type="text" id="p3" placeholder="Player 3 Name (Optional)">
            <input type="text" id="p4" placeholder="Player 4 Name (Optional)">
        </div>
        <div class="config-group">
            <select id="local-mode-select">
                <option value="cities">Cities</option>
                <option value="countries">Countries</option>
                <option value="mountains">Mountains</option>
                <option value="landmarks">Landmarks</option>
            </select>
            <select id="local-round-select">
                <option value="3">3 Rounds</option><option value="5">5 Rounds</option>
                <option value="7">7 Rounds</option><option value="10">10 Rounds</option>
            </select>
        </div>
        <button onclick="startLocalGame()">Start Local Game</button>
        <button onclick="navTo('home-screen')" class="btn-secondary">Back</button>
    </div>

    <div id="online-menu-screen" class="screen">
        <h1>Online Play</h1>
        <div class="config-group">
            <input type="text" id="my-online-name" placeholder="Your Name">
        </div>
        <div class="config-group">
            <h3>Host a Game</h3>
            <button onclick="hostRoom()" class="btn-success">Create Room</button>
        </div>
        <div class="config-group">
            <h3>Join a Game</h3>
            <input type="text" id="join-room-code" placeholder="Enter Room Code" style="text-transform: uppercase;">
            <button onclick="joinRoom()">Join Room</button>
        </div>
        <button onclick="navTo('home-screen')" class="btn-secondary">Back</button>
    </div>

    <div id="lobby-screen" class="screen">
        <h1>Room Code: <span id="display-room-code" style="color:var(--accent);">...</span></h1>
        <p id="lobby-status">Waiting for players...</p>
        <p id="lobby-error" style="color: var(--accent); display: none; text-align: center; font-size: 14px; font-weight: bold;"></p>
        
        <div class="leaderboard" id="lobby-players">
            </div>

        <div id="host-controls" class="config-group" style="display: none;">
            <select id="online-mode-select">
                <option value="cities">Cities</option>
                <option value="countries">Countries</option>
                <option value="mountains">Mountains</option>
                <option value="landmarks">Landmarks</option>
            </select>
            <select id="online-round-select">
                <option value="3">3 Rounds</option><option value="5">5 Rounds</option>
                <option value="7">7 Rounds</option>
            </select>
            <button onclick="startOnlineGame()" class="btn-success">Start Game</button>
        </div>
        
        <button onclick="location.reload()" class="btn-danger" style="margin-top: 15px; width: 90%; max-width: 350px;">Leave / Try Again</button>
    </div>

    <div id="pass-screen" class="screen">
        <h1 style="margin-top: 25vh;">Round <span id="pass-round"></span></h1>
        <h2>Turn: <span id="pass-player-name" style="color: var(--primary); font-size: 32px;"></span></h2>
        <p style="text-align: center; margin-bottom: 40px;">Pass the phone to this player.</p>
        <button onclick="startTurn()">I'm Ready!</button>
    </div>

    <div id="game-screen" class="screen" style="padding: 10px;">
        <div class="top-bar">
            <div style="font-size: 14px; color: var(--text);">Round <span id="ui-round">1</span> <span id="ui-player-display"></span></div>
            <div style="margin-top: 5px;">Find:</div>
            <div class="target-location" id="ui-target">Target</div>
        </div>
        
        <div id="map-container">
            <div id="map"></div>
            <div id="waiting-overlay" class="waiting-overlay">Waiting for others...</div>
        </div>
        
        <button id="confirm-btn" class="btn-success" onclick="confirmGuess()" style="display: none; margin-bottom: 0;">Confirm Pin</button>
    </div>

    <div id="round-map-screen" class="screen" style="padding: 10px;">
        <div class="top-bar" style="padding: 10px;">
            <div style="font-size: 14px; color: var(--text);">Round <span id="map-res-round">1</span> Results</div>
            <div class="target-location" id="map-res-target" style="font-size: 20px;">Target</div>
        </div>
        <div id="result-map-container">
            <div id="map-scoreboard-overlay" class="map-overlay-scoreboard"></div>
            <div id="result-map"></div>
        </div>
        <button id="next-round-btn" onclick="nextRoundOrFinish()" style="margin-bottom: 0; display:none;">Continue</button>
        <div id="waiting-host-msg" style="display:none; text-align:center; padding:15px; font-weight: bold; color: var(--primary);">Waiting for Host to continue...</div>
    </div>

    <div id="final-results-screen" class="screen">
        <h1 style="color: var(--success); font-size: 40px;">Game Over!</h1>
        <h2>Final Scoreboard</h2>
        <div class="leaderboard" id="final-leaderboard"></div>
        <button onclick="location.reload()">Return to Menu</button>
    </div>

<script>
    // --- DATABASE ---
    const rawDb = {
        cities: [["Tokyo",35.676,139.65],["Delhi",28.613,77.209],["Shanghai",31.23,121.473],["Sao Paulo",-23.55,-46.633],["Mexico City",19.432,-99.133],["Cairo",30.044,31.235],["Mumbai",19.076,72.877],["Beijing",39.904,116.407],["New York",40.712,-74.006],["Buenos Aires",-34.603,-58.381],["Istanbul",41.008,28.978],["Rio de Janeiro",-22.906,-43.172],["Los Angeles",34.052,-118.243],["Moscow",55.755,37.617],["Paris",48.856,2.352],["Bangkok",13.756,100.501],["London",51.507,-0.127],["Sydney",-33.868,151.209],["Rome",41.902,12.496],["Dubai",25.204,55.27]],
        countries: [["Australia",-25.274,133.775],["Brazil",-14.235,-51.925],["Canada",56.13,-106.346],["China",35.861,104.195],["Egypt",26.82,30.802],["France",46.227,2.213],["Germany",51.165,10.451],["India",20.593,78.962],["Italy",41.871,12.567],["Japan",36.204,138.252],["Mexico",23.634,-102.552],["Russia",61.524,105.318],["South Africa",-30.559,22.937],["Spain",40.463,-3.749],["United Kingdom",55.378,-3.435],["United States",37.09,-95.712]],
        mountains: [["Mount Everest",27.988,86.925],["K2",35.881,76.515],["Denali",63.069,-151.007],["Mount Kilimanjaro",-3.067,37.355],["Mont Blanc",45.832,6.865],["Matterhorn",45.976,7.658],["Mount Fuji",35.36,138.727],["Aconcagua",-32.653,-70.01],["Table Mountain",-33.962,18.409],["Mount Vesuvius",40.822,14.426]],
        landmarks: [["Eiffel Tower",48.858,2.294],["Statue of Liberty",40.689,-74.044],["Taj Mahal",27.175,78.042],["Colosseum",41.89,12.492],["Machu Picchu",-13.163,-72.545],["Pyramids of Giza",29.979,31.134],["Great Wall of China",40.431,116.57],["Stonehenge",51.178,-1.826],["Sydney Opera House",-33.856,151.215],["Burj Khalifa",25.197,55.274]]
    };
    const db = {};
    for (let key in rawDb) { db[key] = rawDb[key].map(i => ({ name: i[0], lat: i[1], lng: i[2] })); }

    // --- GAME STATE ---
    let mode = 'local';
    let isHost = false;
    let players = []; 
    let totalRounds = 3;
    let currentRound = 1;
    let currentLocations = [];
    let currentTarget = null;
    
    // Local specific
    let currentPlayerIndex = 0; 
    
    // Online specific
    let peer = null;
    let connections = []; 
    let hostConn = null; 
    let myId = '';
    let onlineGuessesReceived = 0;

    // Maps
    let map = null, currentMarker = null, currentGuess = null;
    let resultMap = null, resultMarkers = [];

    // --- NAVIGATION ---
    function navTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // --- LOCAL PLAY LOGIC ---
    function startLocalGame() {
        mode = 'local';
        players = [];
        for(let i=1; i<=4; i++) {
            const name = document.getElementById(`p${i}`).value.trim();
            if(name) players.push({ id: `p${i}`, name: name, totalScore: 0, roundScore: 0, roundDist: 0, lastGuess: null });
        }
        if(players.length === 0) players.push({ id: 'p1', name: "Player 1", totalScore: 0, roundScore: 0, roundDist: 0, lastGuess: null });

        totalRounds = parseInt(document.getElementById('local-round-select').value);
        const cat = document.getElementById('local-mode-select').value;
        currentLocations = [...db[cat]].sort(() => 0.5 - Math.random()).slice(0, totalRounds);
        currentRound = 1;
        
        initMap();
        setupLocalRound();
    }

    function setupLocalRound() {
        currentTarget = currentLocations[currentRound - 1];
        currentPlayerIndex = 0;
        document.getElementById('pass-round').innerText = currentRound;
        document.getElementById('pass-player-name').innerText = players[currentPlayerIndex].name;
        navTo('pass-screen');
    }

    // --- ONLINE MULTIPLAYER LOGIC ---
    function generateRoomCode() {
        return Math.random().toString(36).substring(2, 6).toUpperCase();
    }

    function initPeer(onOpen) {
        const name = document.getElementById('my-online-name').value.trim() || "Player";
        peer = new Peer('geopin-' + generateRoomCode()); 
        
        peer.on('open', (id) => {
            myId = id;
            players = []; // clear in case of retry
            players.push({ id: myId, name: name, totalScore: 0, roundScore: 0, roundDist: 0, lastGuess: null });
            if(onOpen) onOpen(id);
        });

        // NEW: Explicit error handling for the peer server
        peer.on('error', (err) => {
            document.getElementById('lobby-error').style.display = 'block';
            document.getElementById('lobby-error').innerText = "Network Error (" + err.type + "). Please try again.";
            document.getElementById('lobby-status').innerText = "Connection Failed.";
        });
    }

    function hostRoom() {
        mode = 'online';
        isHost = true;
        document.getElementById('lobby-status').innerText = "Creating room...";
        document.getElementById('lobby-error').style.display = 'none';
        navTo('lobby-screen');

        initPeer((id) => {
            const roomCode = id.replace('geopin-', '');
            document.getElementById('display-room-code').innerText = roomCode;
            document.getElementById('host-controls').style.display = 'block';
            updateLobbyUI();

            peer.on('connection', (conn) => {
                connections.push(conn);
                conn.on('data', (data) => handleHostData(conn, data));
            });
        });
    }

    function joinRoom() {
        mode = 'online';
        isHost = false;
        const code = document.getElementById('join-room-code').value.trim().toUpperCase();
        if(!code) return alert("Enter a room code");
        
        document.getElementById('lobby-status').innerText = "Connecting to host...";
        document.getElementById('lobby-error').style.display = 'none';
        navTo('lobby-screen');
        document.getElementById('display-room-code').innerText = code;

        initPeer((id) => {
            // reliable: true forces WebRTC to use a more stable connection protocol
            hostConn = peer.connect('geopin-' + code, { reliable: true });
            
            // NEW: 10 second timeout check
            const connectTimeout = setTimeout(() => {
                if (!hostConn.open) {
                    document.getElementById('lobby-error').style.display = 'block';
                    document.getElementById('lobby-error').innerText = "Could not reach host. Are they still in the lobby? Did you type the code right?";
                    document.getElementById('lobby-status').innerText = "Connection Failed.";
                }
            }, 10000);

            hostConn.on('open', () => {
                clearTimeout(connectTimeout); // We connected successfully, cancel the timeout error
                document.getElementById('lobby-status').innerText = "Connected! Waiting for host to start...";
                hostConn.send({ type: 'JOIN', id: myId, name: players[0].name });
            });

            hostConn.on('error', (err) => {
                document.getElementById('lobby-error').style.display = 'block';
                document.getElementById('lobby-error').innerText = "Connection Dropped. Please try again.";
            });

            hostConn.on('data', (data) => handleGuestData(data));
        });
    }

    function updateLobbyUI() {
        const board = document.getElementById('lobby-players');
        board.innerHTML = '';
        players.forEach(p => {
            board.innerHTML += `<div class="score-row"><div>${p.name}</div>${p.id === myId ? '<small style="color:var(--primary);">(You)</small>' : ''}</div>`;
        });
        document.getElementById('lobby-status').innerText = `Players: ${players.length}/4`;
    }

    // Host receives data from Guests
    function handleHostData(conn, data) {
        if (data.type === 'JOIN') {
            players.push({ id: data.id, name: data.name, totalScore: 0, roundScore: 0, roundDist: 0, lastGuess: null });
            updateLobbyUI();
            broadcast({ type: 'LOBBY_UPDATE', players: players });
        }
        else if (data.type === 'GUESS') {
            const p = players.find(p => p.id === data.id);
            if (p) {
                p.lastGuess = data.guess;
                processGuessForPlayer(p);
                onlineGuessesReceived++;
                if (onlineGuessesReceived >= players.length) {
                    finishOnlineRound();
                }
            }
        }
    }

    // Guest receives data from Host
    function handleGuestData(data) {
        if (data.type === 'LOBBY_UPDATE') {
            players = data.players;
            updateLobbyUI();
        }
        else if (data.type === 'START_GAME') {
            players = data.players;
            currentLocations = data.locations;
            totalRounds = data.totalRounds;
            currentRound = 1;
            initMap();
            startTurn(); 
        }
        else if (data.type === 'ROUND_RESULTS') {
            players = data.players;
            showRoundMapResults();
        }
        else if (data.type === 'NEXT_ROUND') {
            currentRound = data.round;
            startTurn();
        }
        else if (data.type === 'END_GAME') {
            players = data.players;
            showFinalResults();
        }
    }

    function broadcast(data) {
        connections.forEach(conn => conn.send(data));
    }

    function startOnlineGame() {
        totalRounds = parseInt(document.getElementById('online-round-select').value);
        const cat = document.getElementById('online-mode-select').value;
        currentLocations = [...db[cat]].sort(() => 0.5 - Math.random()).slice(0, totalRounds);
        currentRound = 1;
        
        broadcast({ 
            type: 'START_GAME', 
            players: players, 
            locations: currentLocations, 
            totalRounds: totalRounds 
        });
        
        initMap();
        startTurn();
    }

    function finishOnlineRound() {
        broadcast({ type: 'ROUND_RESULTS', players: players });
        showRoundMapResults(); 
    }

    // --- GAMEPLAY (Shared) ---
    function initMap() {
        if (map !== null) map.remove();
        map = L.map('map', { center: [20, 0], zoom: 2, zoomControl: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap', subdomains: 'abcd', maxZoom: 19
        }).addTo(map);

        map.on('click', function(e) {
            currentGuess = e.latlng;
            if (currentMarker) map.removeLayer(currentMarker);
            currentMarker = L.marker(currentGuess).addTo(map);
            document.getElementById('confirm-btn').style.display = 'block';
        });
    }

    function startTurn() {
        navTo('game-screen');
        currentTarget = currentLocations[currentRound - 1];
        
        document.getElementById('ui-round').innerText = currentRound + " / " + totalRounds;
        if (mode === 'local') {
            document.getElementById('ui-player-display').innerText = "| " + players[currentPlayerIndex].name + "'s Turn";
        } else {
            document.getElementById('ui-player-display').innerText = "";
        }
        
        document.getElementById('ui-target').innerText = currentTarget.name;
        document.getElementById('waiting-overlay').style.display = 'none';
        
        if (currentMarker) map.removeLayer(currentMarker);
        currentGuess = null;
        document.getElementById('confirm-btn').style.display = 'none';
        map.setView([20, 0], 2); 
        setTimeout(() => map.invalidateSize(), 100); 
    }

    function confirmGuess() {
        document.getElementById('confirm-btn').style.display = 'none';
        
        if (mode === 'local') {
            const player = players[currentPlayerIndex];
            player.lastGuess = { lat: currentGuess.lat, lng: currentGuess.lng };
            processGuessForPlayer(player);
            currentPlayerIndex++;
            if (currentPlayerIndex < players.length) {
                document.getElementById('pass-player-name').innerText = players[currentPlayerIndex].name;
                navTo('pass-screen');
            } else {
                showRoundMapResults();
            }
        } 
        else if (mode === 'online') {
            document.getElementById('waiting-overlay').style.display = 'flex';
            if (isHost) {
                const p = players.find(p => p.id === myId);
                p.lastGuess = { lat: currentGuess.lat, lng: currentGuess.lng };
                processGuessForPlayer(p);
                onlineGuessesReceived++;
                if (onlineGuessesReceived >= players.length) finishOnlineRound();
            } else {
                hostConn.send({ type: 'GUESS', id: myId, guess: { lat: currentGuess.lat, lng: currentGuess.lng }});
            }
        }
    }

    function processGuessForPlayer(player) {
        const distKm = getDist(player.lastGuess.lat, player.lastGuess.lng, currentTarget.lat, currentTarget.lng);
        let score = distKm <= 30 ? 5000 : Math.floor(5000 * Math.exp(-distKm / 2500)); 
        player.roundScore = score < 0 ? 0 : score;
        player.roundDist = distKm;
        player.totalScore += player.roundScore;
    }

    // --- RESULTS (Shared) ---
    function showRoundMapResults() {
        navTo('round-map-screen');
        document.getElementById('map-res-round').innerText = currentRound;
        document.getElementById('map-res-target').innerText = currentTarget.name;

        if (mode === 'online') onlineGuessesReceived = 0; 

        // Host controls continuation
        document.getElementById('next-round-btn').style.display = (mode === 'local' || isHost) ? 'block' : 'none';
        document.getElementById('waiting-host-msg').style.display = (mode === 'online' && !isHost) ? 'block' : 'none';

        const sorted = [...players].sort((a, b) => b.roundScore - a.roundScore);
        const overlay = document.getElementById('map-scoreboard-overlay');
        overlay.innerHTML = `<div style="font-weight:bold; color:var(--primary); margin-bottom:8px; border-bottom:1px solid #45475a; padding-bottom:4px;">Scores</div>`;
        sorted.forEach((p, idx) => {
            let shortName = p.name.length > 8 ? p.name.substring(0, 7) + '..' : p.name;
            overlay.innerHTML += `
                <div class="overlay-score-row">
                    <div><b>${idx+1}. ${shortName}</b><br><small style="color:#a6adc8;">${Math.round(p.roundDist).toLocaleString()} km</small></div>
                    <div style="color: var(--success); font-weight: bold; margin-left: 10px;">+${p.roundScore}</div>
                </div>`;
        });

        if (resultMap === null) {
            resultMap = L.map('result-map', { zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(resultMap);
        }

        resultMarkers.forEach(m => resultMap.removeLayer(m));
        resultMarkers = [];
        let boundsArr = [];

        // Target
        const tIcon = L.divIcon({ className: 'target-pin', html: '📍', iconSize: [36, 36], iconAnchor: [18, 18] });
        resultMarkers.push(L.marker([currentTarget.lat, currentTarget.lng], {icon: tIcon}).addTo(resultMap));
        boundsArr.push([currentTarget.lat, currentTarget.lng]);

        // Players
        players.forEach(p => {
            if(p.lastGuess) {
                const pIcon = L.divIcon({ className: 'player-pin', html: p.name.substring(0, 2).toUpperCase(), iconSize: [30, 30], iconAnchor: [15, 15] });
                resultMarkers.push(L.marker([p.lastGuess.lat, p.lastGuess.lng], {icon: pIcon}).addTo(resultMap));
                boundsArr.push([p.lastGuess.lat, p.lastGuess.lng]);
                
                resultMarkers.push(L.polyline([ [p.lastGuess.lat, p.lastGuess.lng], [currentTarget.lat, currentTarget.lng] ], {
                    color: '#11111b', weight: 2, dashArray: '5, 8', opacity: 0.8
                }).addTo(resultMap));
            }
        });

        setTimeout(() => {
            resultMap.invalidateSize();
            resultMap.fitBounds(boundsArr, { paddingTopLeft: [220, 20], paddingBottomRight: [20, 20], maxZoom: 10 });
        }, 100);
    }

    function nextRoundOrFinish() {
        currentRound++;
        if (currentRound > totalRounds) {
            if (mode === 'online' && isHost) broadcast({ type: 'END_GAME', players: players });
            showFinalResults();
        } else {
            if (mode === 'online' && isHost) broadcast({ type: 'NEXT_ROUND', round: currentRound });
            if (mode === 'local') setupLocalRound();
            else startTurn();
        }
    }

    function showFinalResults() {
        navTo('final-results-screen');
        const sorted = [...players].sort((a, b) => b.totalScore - a.totalScore);
        const board = document.getElementById('final-leaderboard');
        board.innerHTML = '';
        sorted.forEach((p, idx) => {
            const medal = idx === 0 ? '🏆' : (idx === 1 ? '🥈' : (idx === 2 ? '🥉' : ''));
            board.innerHTML += `
                <div class="score-row">
                    <div style="font-size: 20px;">${medal} <b>${p.name}</b></div>
                    <div style="color: var(--success); font-size: 22px; font-weight: bold;">${p.totalScore.toLocaleString()}</div>
                </div>`;
        });
    }

    function getDist(lat1, lon1, lat2, lon2) {
      const R = 6371, dLat = (lat2-lat1)*(Math.PI/180), dLon = (lon2-lon1)*(Math.PI/180); 
      const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*(Math.PI/180))*Math.cos(lat2*(Math.PI/180))*Math.sin(dLon/2)*Math.sin(dLon/2); 
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
    }
</script>
</body>
